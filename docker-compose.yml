services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: localtest
    ports:
      - "5433:5432"
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:localtest@db:5432/postgres
      SECRET_KEY: test
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      - db