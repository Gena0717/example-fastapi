name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-central-1

      - name: Build and push image
        run: |
          docker build -t 889749951196.dkr.ecr.eu-central-1.amazonaws.com/fastapi-app:latest .
          docker push 889749951196.dkr.ecr.eu-central-1.amazonaws.com/fastapi-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin 889749951196.dkr.eceu-central-1.amazonaws.com
            docker pull 889749951196.dkr.ecr.eu-central-1.amazonaws.com/fastapi-app:latest
            docker stop fastapi-app || true
            docker rm fastapi-app || true
            docker run -d --name fastapi-app -p 80:8000 --env-file /home/ec2-user/.env 889749951196.dkr.ecr.eu-central-1.amazonaws.cofastapi-app:latest
